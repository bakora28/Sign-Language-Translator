<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تواصل - المحادثات</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="icon" type="image/png" href="/static/log.png">
    <style>
        body {
            background-image: url('https://www.microsoft.com/en-us/research/uploads/prod/2023/11/SLD-BlogHeroFeature-1400x788-1.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            min-height: 100vh;
            padding-bottom: 60px;
        }
        header {
            background-color: rgba(0, 123, 255, 0.9);
            color: white;
            padding: 40px 15px;
            text-align: center;
            border-bottom: 2px solid #0056b3;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-container img {
            width: 80px;
            height: 60px;
            border-radius: 0%;
        }
        .logo-container a {
            text-decoration: none;
            font-size: 35px;
            font-weight: bold;
            color: #ffffff;
        }
        .lang-login-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn, 
        .my-btn,
        .user-dropdown-btn {
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .my-btn-primary,
        .btn-primary {
            background-color: #007bff;
            color: white;
            border: none;
        }
        .my-btn-light {
            box-shadow: none;
            outline: none;
            border: none;
            background-color: #0056b3;
            color: white;
        }
        .my-btn-primary:hover,
        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        .my-btn-light:hover {
            background-color: #007bff;
        }
        .user-dropdown {
            position: relative;
            display: inline-block;
        }
        .dropdown-content,
        .dropdown-menu {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 5px;
            left: 0;
        }

        .dropdown-item{
            background-color: #ffffff;
        }
        .dropdown-content a {
            padding: 8px 16px;
            color: #000;
            text-decoration: none;
            display: block;
            text-align: right;
            font-weight: bold;
        }

        .dropdown-item:hover,
        .dropdown-content a:hover {
            background-color: #0080ff;
            color: #000;
            font-weight: bold;
        }

        .user-dropdown:hover .dropdown-content,
        .dropdown:hover .dropdown-menu {
            display: block;
        }
        .lang-btn {
            background: #0056b3;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 40px;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .lang-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .video-call-btn {
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .video-call-btn:hover {
            background-color: #218838;
        }
        .video-call-btn img {
            width: 20px;
            height: 20px;
        }
        .chat-container {
            display: flex;
            padding-top: 120px;
            padding-bottom: 60px;
        }
        .friends-list {
            border-radius: 5px;
            width: 30%;
            background-color: rgba(255, 255, 255, 0.293);
            height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 5px;
            border-left: 1px solid #dee2e6;
        }
        .search-friend {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }
        .search-friend input {
            flex-grow: 1;
        }
        .friend-item-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            cursor: pointer;
            color: #333;
            border-bottom: 1px solid #000000;
            transition: background-color 0.2s;
        }
        .friend-item-container:hover {
            background-color: #e9ecef;
        }
        .friend-name {
            flex-grow: 1;
        }
        .remove-friend-btn {
            background: none;
            border: none;
            color: #dc3545;
            font-weight: bold;
            cursor: pointer;
            padding: 0 5px;
            font-size: 16px;
        }
        .remove-friend-btn:hover {
            color: #bb2d3b;
        }
        .chat-area {
            width: 70%;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background-color: rgb(0, 38, 255);
            color: white;
            padding: 10px;
            border-radius: 5px 5px 0 0;
            text-align: center;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages {
            flex-grow: 1;
            background-color: rgba(255, 255, 255, 0.411);
            padding: 10px;
            overflow-y: auto;
            height: calc(100vh - 240px);
            border: 1px solid #dee2e6;
            border-radius: 5px;
        }
        .message {
            margin: 10px 0;
            padding: 8px 12px;
            border-radius: 5px;
            max-width: 70%;
            word-wrap: break-word;
        }
        .sent {
            background-color: #007bff;
            color: white;
            margin-left: auto;
        }
        .received {
            background-color: #ed2011;
            color: white;
            margin-right: auto;
        }
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .input-area input {
            flex-grow: 1;
        }
        footer {
            background-color: rgba(51, 51, 51, 0.9);
            color: white;
            padding: 10px;
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .footer-links {
            margin-left: 20px;
        }
        .footer-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/static/log.png" alt="Logo">
            <a href="/ENhome">تواصل</a>
        </div>

        <div class="lang-login-container">
            <!-- زر اللغة الإنجليزية -->
            <a href="/ENchats" class="lang-btn">English</a>
            
            <!-- قائمة الملف الشخصي للمستخدم المسجل فقط -->
            <div class="dropdown">
                <button class="my-btn my-btn-light dropdown-toggle lang-btn" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                    {{ user.username if user and user.username else username }}
                </button>
                <ul class="dropdown-menu text-end" aria-labelledby="userDropdown">
                    <li><a class="dropdown-item" href="/chats">المحادثات</a></li>
                    <li><a class="dropdown-item" href="/feedback">تقييم الموقع</a></li>
                    <li><a class="dropdown-item" href="/logout">تسجيل الخروج</a></li>
                </ul>

    </header>

<div class="chat-container">
        <div class="friends-list">
            <div class="search-friend">
                <input type="text" id="friendUsername" class="form-control" placeholder="اسم المستخدم">
                <button class="btn btn-primary" onclick="addFriend()">إضافة</button>
            </div>
            <div id="friendsList">
                {% for friend in friends %}
                    <div class="friend-item-container" data-username="{{ friend }}">
                        <span class="friend-name" onclick="selectFriend('{{ friend }}')">{{ friend }}</span>
                        <button class="remove-friend-btn" onclick="removeFriend(event, '{{ friend }}')">×</button>
                    </div>
                {% endfor %}
            </div>
        </div>
        <div class="chat-area">
            <div class="chat-header" id="chatHeader">
                <span id="currentFriendName">اختر صديقًا للمحادثة</span>
                <button class="video-call-btn" id="videoCallBtn" onclick="startVideoCall()" title="مكالمة فيديو" style="display: none;">
                    <img src="/static/R.png" alt="Video Call">
                </button>
            </div>
            <div class="messages" id="messages">
                <!-- Messages will be loaded dynamically -->
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" class="form-control" placeholder="اكتب رسالتك..." onkeypress="handleKeyPress(event)">
                <button class="btn btn-primary" onclick="sendMessage()">إرسال</button>
            </div>
        </div>
    </div>

    <footer>
        <p style="margin-right: 20px;">© 2025 تواصل. جميع الحقوق محفوظة.</p>
        <div class="footer-links">
            <a href="/ARprivacy">سياسة المستخدم والخصوصية</a>
            <a href="/ARabout">عن الموقع</a>
        </div>
    </footer>

   <script>
        let currentFriend = null;
        let messages = JSON.parse('{{ messages | tojson | safe }}') || {};

        document.addEventListener('DOMContentLoaded', function() {
            console.log("Initial messages:", messages);
            
            // Check if there's a friend parameter in URL
            const urlParams = new URLSearchParams(window.location.search);
            const friendParam = urlParams.get('friend');
            
            if (friendParam && '{{ friends | tojson | safe }}'.includes(friendParam)) {
                selectFriend(friendParam);
            }
        });

        function addFriend() {
            const friendUsername = document.getElementById('friendUsername').value.trim();
            
            if (!friendUsername) {
                alert('يرجى إدخال اسم مستخدم صحيح');
                return;
            }

            // Check if friend already exists
            if (document.querySelector(`.friend-item-container[data-username="${friendUsername}"]`)) {
                alert('هذا المستخدم مضاف بالفعل كصديق!');
                return;
            }

            // Send request to server
            fetch('/add-friend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ friendUsername: friendUsername })
            })
            .then(response => {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(data => {
                if (data.error) {
                    throw new Error(data.error);
                }
                
                // Add friend to UI
                const friendItem = document.createElement('div');
                friendItem.className = 'friend-item-container';
                friendItem.setAttribute('data-username', friendUsername);
                friendItem.innerHTML = `
                    <span class="friend-name" onclick="selectFriend('${friendUsername}')">${friendUsername}</span>
                    <button class="remove-friend-btn" onclick="removeFriend(event, '${friendUsername}')">×</button>
                `;
                document.getElementById('friendsList').appendChild(friendItem);
                document.getElementById('friendUsername').value = '';
                
                // Initialize messages storage
                if (!messages[friendUsername]) {
                    messages[friendUsername] = [];
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert(error.message || 'حدث خطأ أثناء إضافة الصديق');
            });
        }

        function removeFriend(event, friendUsername) {
            event.stopPropagation();
            
            if (confirm(`هل أنت متأكد من رغبتك في إزالة ${friendUsername} من قائمة أصدقائك؟`)) {
                fetch('/remove-friend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ friendUsername: friendUsername })
                })
                .then(response => {
                    if (!response.ok) throw new Error('Network response was not ok');
                    return response.json();
                })
                .then(data => {
                    if (data.success) {
                        // Remove friend from UI
                        document.querySelector(`.friend-item-container[data-username="${friendUsername}"]`).remove();
                        
                        // Reset chat if removed friend was current
                        if (currentFriend === friendUsername) {
                            currentFriend = null;
                            document.getElementById('currentFriendName').textContent = 'اختر صديقًا للمحادثة';
                            document.getElementById('videoCallBtn').style.display = 'none';
                            document.getElementById('messages').innerHTML = '';
                        }
                        
                        // Remove messages
                        delete messages[friendUsername];
                    } else {
                        alert(data.message || 'حدث خطأ أثناء إزالة الصديق');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('حدث خطأ أثناء إزالة الصديق. يرجى المحاولة مرة أخرى.');
                });
            }
        }

        function selectFriend(friend) {
            currentFriend = friend;
            document.getElementById('currentFriendName').textContent = friend;
            document.getElementById('videoCallBtn').style.display = 'flex';
            
            const messagesDiv = document.getElementById('messages');
            messagesDiv.innerHTML = '';
            
            if (messages[friend] && messages[friend].length > 0) {
                messages[friend].forEach(msg => {
                    displayMessage(msg.sender, msg.text, msg.isCurrentUser);
                });
            }
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function displayMessage(sender, text, isCurrentUser) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isCurrentUser ? 'sent' : 'received'}`;
            
            const messageText = document.createElement('div');
            messageText.textContent = text;
            

            
            messageDiv.appendChild(messageText);
            messagesDiv.appendChild(messageDiv);
            
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

       


        function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const messageText = messageInput.value.trim();
            
            if (!messageText || !currentFriend) return;

            const message = {
                sender: '{{ user.username }}',
                text: messageText,
                isCurrentUser: true
            };

            displayMessage(message.sender, message.text, message.isCurrentUser);
            
            if (!messages[currentFriend]) {
                messages[currentFriend] = [];
            }
            messages[currentFriend].push(message);
            
            messageInput.value = '';
            
            fetch('/send-message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    to: currentFriend, 
                    message: messageText,
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) console.error(data.error);
            })
            .catch(error => console.error('Error:', error));
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function startVideoCall() {
            if (currentFriend) {
                window.location.href = '/video?friend=' + encodeURIComponent(currentFriend);
            } else {
                alert('يرجى اختيار صديق أولاً!');
            }
        }
    </script>
</body>
</html>
