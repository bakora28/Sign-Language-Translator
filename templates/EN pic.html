<!doctype html>
<html lang="en">
<head>
    <title>tawasol</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="icon" type="image/png" href="static/log.png">

    <style>
        /* General Body Styling */
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-image: url('https://www.microsoft.com/en-us/research/uploads/prod/2023/11/SLD-BlogHeroFeature-1400x788-1.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            color: #333;
            min-height: 100vh;
            padding-top: 120px;
            padding-bottom: 60px;
        }

        header {
            background-color: rgba(0, 123, 255, 0.9);
            color: white;
            padding: 40px 15px;
            border-bottom: 2px solid #0056b3;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            width: 100%;
            position: fixed;
            top: 0;
        }

        /* ======== Container Classes ======== */
        .auth-container, 
        .lang-login-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* ======== Button Styles ======== */
        .btn, 
        .my-btn,
        .user-dropdown-btn {
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Button Color Variants */
        .my-btn-primary,
        .btn-primary {
            background-color: #007bff;
            color: white;
            border: none;
        }

        .my-btn-light {
            box-shadow: none;
            outline: none;
            border: none;
            background-color: #0056b3;
            color: white;
        }

        .my-btn-danger {
            background-color: #dc3545;
            color: white;
        }

        /* Button Hover States */
        .my-btn-primary:hover,
        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .my-btn-light:hover {
            background-color: #007bff;
        }

        .my-btn-danger:hover {
            background-color: #bb2d3b;
        }

        /* ======== Dropdown Styles ======== */
        .user-dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content,
        .dropdown-menu {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 160px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 1;
            border-radius: 5px;
            right: 0;
        }

        .dropdown-item{
            background-color: #ffffff;
        }
        .dropdown-content a {
            padding: 8px 16px;
            color: #000;
            text-decoration: none;
            display: block;
            text-align: right;
            font-weight: bold;
        }

        .dropdown-item:hover,
        .dropdown-content a:hover {
            background-color: #0080ff;
            color: #000;
            font-weight: bold;
        }

        .user-dropdown:hover .dropdown-content,
        .dropdown:hover .dropdown-menu {
            display: block;
        }

        /* ======== Card Styles ======== */
        .content-card,
        .login-card,
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .content-card:hover,
        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        /* ======== Text Styles ======== */
        .content-card h2,
        .modal-title {
            text-align: center;
            margin-bottom: 20px;
        }

        .content-card p {
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .welcome-message {
            font-size: 2rem;
            margin-bottom: 20px;
        }

        /* ======== Footer Styles ======== */
        footer {
            background-color: rgba(51, 51, 51, 0.9);
            color: white;
            padding: 10px;
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-links {
            margin-left: 20px;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* ======== Utility Classes ======== */
        .action-btn {
            margin-top: 20px;
            padding: 10px 25px;
            font-size: 1.1rem;
        }

        .flash-messages {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 1000;
            width: 300px;
        }

        .alert {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
        }

        .text-end {
            text-align: right;
        }

        .lang-btn {
            background: #0056b3;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 40px;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .lang-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        #progress-bar {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<header>
   <div style="display: flex; align-items: center; gap: 10px;">
            <img src="static/log.png" alt="Logo" style="width: 80px; height: 60px; border-radius: 0%;">
            <a href="/ENhome" style="text-decoration: none; font-size: 35px; font-weight: bold; color: #ffffff;">
                tawasol
            </a>
    </div>

    <div class="lang-login-container" style="gap: 10px;">
    <a href="/ARpic" class="lang-btn">عربي</a>

        {% if user %}
        <div class="dropdown">
    <button class="my-btn my-btn-light dropdown-toggle lang-btn" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
        {{ user.username if user and user.username else uesrname }}
    </button>
    <ul class="dropdown-menu text-end" aria-labelledby="userDropdown">
        <li><a class="dropdown-item" href="/ENchats">Chats</a></li>
        <li><a class="dropdown-item" href="/ENfeedback">Feedback</a></li>
        <li><a class="dropdown-item" href="/ENlogout">Log Out</a></li>
    </ul>
    </div>

        {% else %}
        <a href="/ENlogin" class="btn btn-primary btn-sm">Log In</a>
        {% endif %}
    </div>
</header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="text-center mb-4">Upload an Image</h3>
                    <form method="POST" enctype="multipart/form-data" id="uploadForm">
                        <div class="form-group">
                            <label for="model">Select Model:</label>
                            <select name="model" id="model" class="form-select">
                                {% for model in models %}
                                    <option value="{{ model }}">{{ model }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="file">Choose an Image:</label>
                            <input type="file" name="file" id="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">Predict</button>
                    </form>

                    <!-- Progress Bar -->
                    <div id="progress-bar" class="progress mt-4">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;" id="progress-bar-inner">
                            Uploading...
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 tawasol. All rights reserved.</p>
        <div class="footer-links">
            <a href="/ENprivacy">Privacy Policy</a>
            <a href="/ENabout">About</a>
        </div>
    </footer>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show progress bar during upload
        const uploadForm = document.getElementById('uploadForm');
        const progressBar = document.getElementById('progress-bar');
        const progressBarInner = document.getElementById('progress-bar-inner');

        uploadForm.addEventListener('submit', (event) => {
            event.preventDefault(); // Prevent the default form submission
            progressBar.style.display = 'block';

            // Simulate progress (for demonstration)
            let progress = 0;
            const interval = setInterval(() => {
                progress += 10;
                progressBarInner.style.width = progress + '%';
                if (progress >= 100) {
                    clearInterval(interval);
                    uploadForm.submit(); // Submit the form once progress completes
                }
            }, 100);
        });
    </script>
</body>
</html>
