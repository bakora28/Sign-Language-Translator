<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <title>تواصل - تسجيل الدخول</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="icon" type="image/png" href="static/log.png">
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-image: url('https://www.microsoft.com/en-us/research/uploads/prod/2023/11/SLD-BlogHeroFeature-1400x788-1.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            color: #333;
            min-height: 100vh;
            padding-top: 120px;
            padding-bottom: 60px;
        }

        header {
            background-color: rgba(0, 123, 255, 0.9);
            color: white;
            padding: 40px 15px;
            border-bottom: 2px solid #0056b3;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            width: 100%;
            position: fixed;
            top: 0;
        }

        footer {
            background-color: rgba(51, 51, 51, 0.9);
            color: white;
            padding: 10px;
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .footer-links {
            margin-left: 20px;
        }

        .footer-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
            transition: transform 0.2s, background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            color: #333;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            transform: scale(1.03);
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.2);
        }

        .lang-btn {
            background: #0056b3;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 40px;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .lang-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .lang-login-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-message {
            color: red;
            text-align: center;
            margin-top: 10px;
        }

        .modal-header .close-btn {
            position: absolute;
            right: 15px;
            top: 15px;
            font-size: 1.5rem;
            color: #000;
            opacity: 0.5;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
        }

        .modal-header .close-btn:hover {
            opacity: 1;
            color: #007bff;
        }

        .modal-header .modal-title {
            margin-right: 40px;
            text-align: right;
        }

        .modal-body {
            padding: 20px 30px;
        }

        .modal-body .form-group label {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <img src="static/log.png" alt="Logo" style="width: 80px; height: 60px; border-radius: 0%;">
            <a href="/" style="text-decoration: none; font-size: 35px; font-weight: bold; color: #ffffff;">
                تواصل
            </a>
        </div>

        <div class="lang-login-container">
            <a href="/ENlogin" class="lang-btn">English</a>
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="text-center mb-4">تسجيل الدخول</h3>
                    <form id="loginForm" method="POST" action="/ARlogin">
                        <div class="form-group mb-3">
                            <label for="username">البريد الإلكتروني</label>
                            <input type="email" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form-group mb-3">
                            <label for="password">كلمة المرور</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 mt-3">تسجيل الدخول</button>
                        {% if error %}
                            <p class="error-message mt-3">{{ error }}</p>
                        {% endif %}
                        {% if success %}
                            <p class="success-message mt-3" style="color: green; text-align: center;">{{ success }}</p>
                        {% endif %}
                    </form>
                
                    <p class="text-center mt-3">ليس لديك حساب؟ <a href="/ARsignup" style="color: #007bff;">سجل الآن</a></p>
                    <p class="text-center mt-2"><a href="#" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal" style="color: #007bff;">نسيت كلمة المرور؟</a></p>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">إعادة تعيين كلمة المرور</h5>
                    <button type="button" class="close-btn" data-bs-dismiss="modal" aria-label="إغلاق">×</button>
                </div>
                <div class="modal-body">
                    <form id="emailForm">
                        <div class="form-group mb-3">
                            <label for="email">أدخل بريدك الإلكتروني</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">إرسال رابط إعادة التعيين</button>
                    </form>
                    <p id="emailMessage" class="text-center mt-3"></p>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p style="margin-right: 20px;">© 2025 تواصل. جميع الحقوق محفوظة.</p>
        <div class="footer-links">
            <a href="/ARprivacy">سياسة المستخدم والخصوصية</a>
            <a href="/ARabout">عن الموقع</a>
        </div>
    </footer>

    <script>
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            fetch('/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ 'email': email })
            })
            .then(response => response.json())
            .then(data => {
                const messageP = document.getElementById('emailMessage');
                if (data.error) {
                    messageP.style.color = 'red';
                    messageP.textContent = data.error;
                } else {
                    messageP.style.color = 'green';
                    messageP.textContent = data.message;
                }
            })
            .catch(error => {
                document.getElementById('emailMessage').style.color = 'red';
                document.getElementById('emailMessage').textContent = 'خطأ أثناء إرسال الطلب';
            });
        });
    </script>
</body>
</html>
