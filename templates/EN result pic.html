<!doctype html>
<html>
<head>
    <title>Prediction Result</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
            background-image: url('https://www.microsoft.com/en-us/research/uploads/prod/2023/11/SLD-BlogHeroFeature-1400x788-1.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            font-family: 'Arial', sans-serif;
            color: #333;
            min-height: 100vh;
            padding-bottom: 60px;
            padding-top: 60px; /* Added to account for fixed header */
        }
        header {
            background-color: rgba(0, 123, 255, 0.9);
            color: white;
            padding: 40px 15px;
            text-align: center;
            border-bottom: 2px solid #0056b3;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 50px;
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-container img {
            width: 80px;
            height: 60px;
            border-radius: 0%; /* Changed from 50% to 0% to match home.html */
        }
        .logo-container a {
            text-decoration: none;
            font-size: 35px;
            font-weight: bold;
            color: #ffffff;
        }
        .lang-login-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .btn, .my-btn  {
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .my-btn-primary, .btn-primary {
            background-color: #007bff;
            color: white;
            border: none;
        }
        .my-btn-light {
            box-shadow: none;
            outline: none;
            border: none;
            background-color: #0056b3;
            color: white;
        }
        .my-btn-primary:hover, .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        .my-btn-light:hover {
            background-color: #007bff;
        }
        .lang-btn {
            background: #0056b3;
            box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            width: 90px;
            height: 40px;
            color: white;
            border-radius: 5px;
            font-weight: bold;
            text-decoration: none;
            transition: background-color 0.2s;
        }
        .lang-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: scale(1.03);
            box-shadow: 0px 8px 15px rgba(0, 0, 0, 0.3);
        }
        .btn-primary {
            background-color: #007bff;
            border: none;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            transform: scale(1.05);
        }
        footer {
            background-color: rgba(51, 51, 51, 0.9);
            color: white;
            padding: 10px;
            width: 100%;
            position: fixed;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }
        .footer-links {
            margin-left: 20px;
        }
        .footer-links a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }
        .footer-links a:hover {
            text-decoration: underline;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="/static/log.png" alt="Logo">
            <a href="/ENhome">tawasol</a>
        </div>

        <div class="lang-login-container">
            <!-- Language Toggle -->
            <a href="/ARhome" class="lang-btn">عربي</a>
            
        </div>
    </header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card p-4">
                    <h3 class="text-center mb-4">Result</h3>
                    <p><strong>Model Used:</strong> {{ model }}</p>
                    <p><strong>Predicted Label:</strong> {{ label }}</p>
                    <a href="/ENhome" class="btn btn-primary w-100">Go Back</a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2025 tawasol. All rights reserved.</p>
        <div class="footer-links">
            <a href="/ENprivacy">Privacy Policy</a>
            <a href="/ENabout">About</a>
        </div>
    </footer>
</body>
</html>
