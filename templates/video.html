<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>تواصل</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            direction: rtl;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #202124;
            height: 100vh;
            overflow: hidden;
        }
      
        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }
        .video-section {
            flex: 3;
            background-color: #ffffff;
            padding: 10px;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        #timer {
            font-size: 16px;
            font-weight: bold;
            color: #000000;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #recording-indicator {
            background-color: #c5221f;
            color: white;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }
        #video-feed {
            width: 100%;
            height: calc(100% - 90px);
            background-color: #757575;
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        #local-video, #remote-video, #screen-share {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #video-placeholder {
            max-width: 200px;
            max-height: 200px;
        }
        .video-overlay {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 200px;
            height: 150px;
            background-color: #333;
            border-radius: 4px;
            overflow: hidden;
            z-index: 10;
        }
        .controls {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .controls button {
            padding: 8px 12px;
            background-color: #ffffff;
            color: #202124;
            border: 1px solid #dadce0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 100px;
            justify-content: center;
        }
        .controls button:hover {
            background-color: #e8f0fe;
        }
        .controls .red {
            background-color: #c5221f;
            color: white;
        }
        .controls .red:hover {
            background-color: #a50e0b;
        }
        .controls .active {
            background-color: #e8f0fe;
            color: #1a73e8;
            border-color: #1a73e8;
        }
        .controls .blue {
            background-color: #1a73e8;
            color: white;
        }
        .controls .blue:hover {
            background-color: #1557b0;
        }
        .chat-section {
            flex: 1;
            background-color: #ffffff;
            padding: 10px;
            border-left: 1px solid #dadce0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .chat-input-container {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #chat-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #dadce0;
            border-radius: 20px;
            background-color: #f1f3f4;
            margin-bottom: 0;
            font-size: 14px;
        }
        #send-btn {
            padding: 10px 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        #send-btn:hover {
            background-color: #1557b0;
        }
        .gif-container {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #f1f3f4;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-height: 60%;
        }
        .gif-container img {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            margin: 5px 0;
        }
        .translation-section {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background-color: #f1f3f4;
            border-radius: 8px;
            margin-top: 10px;
            max-height: 40%;
            border: 1px solid #dadce0;
        }
        .translation-message {
            margin: 5px 0;
            padding: 8px;
            background-color: #ffffff;
            border-radius: 8px;
            font-size: 14px;
        }
        .translation-message.local {
            background-color: #e8f0fe;
            color: #1a73e8;
            text-align: left;
        }
        .translation-message.remote {
            background-color: #f1f3f4;
            text-align: right;
        }
        .status-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            background-color: rgba(0,0,0,0.5);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 10;
        }
        .camera-off-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            z-index: 5;
            flex-direction: column;
        }
        .user-name {
            font-weight: bold;
            margin-top: 10px;
            font-size: 14px;
        }
        .hidden {
            display: none;
        }
        #download-btn {
            position: absolute;
            bottom: 70px;
            right: 20px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="video-section">
            <div id="timer">
                <span>00:00</span>
                <span id="recording-indicator">● تسجيل</span>
            </div>
            <div id="video-feed">
                <img id="video-placeholder" src="https://via.placeholder.com/200" alt="Video Placeholder">
                <video id="remote-video" autoplay playsinline class="hidden"></video>
                <video id="screen-share" autoplay playsinline class="hidden"></video>
                <div class="video-overlay">
                    <video id="local-video" autoplay playsinline muted class="hidden"></video>
                    <div id="camera-off-overlay" class="camera-off-overlay hidden">
                        <div>الكاميرا مغلقة</div>
                        <div class="user-name">{{ user.username if user else uesrname }}</div>
                    </div>
                </div>
                <div id="mic-status" class="status-indicator hidden">الميكروفون: مغلق</div>
                <div id="camera-status" class="status-indicator hidden" style="top: 40px;">الكاميرا: مغلقة</div>
                <div id="screen-share-status" class="status-indicator hidden" style="top: 70px;">مشاركة الشاشة: نشطة</div>
                <button id="download-btn" title="تنزيل التسجيل">⬇️</button>
            </div>
            <div class="controls">
                <button id="mic-btn" class="blue" onclick="toggleMic()">
                    <span id="mic-icon">🎤</span> <span id="mic-text">إغلاق الميكروفون</span>
                </button>
                <button id="camera-btn" class="blue" onclick="toggleCamera()">
                    <span id="camera-icon">📷</span> <span id="camera-text">إغلاق الكاميرا</span>
                </button>
                <button id="screen-share-btn" class="blue" onclick="toggleScreenShare()">
                    <span id="screen-share-icon">🖥️</span> <span id="screen-share-text">مشاركة الشاشة</span>
                </button>
                <button id="record-btn" class="blue" onclick="toggleRecording()">
                    <span id="record-icon">●</span> <span id="record-text">تسجيل الشاشة</span>
                </button>
                <button id="end-call-btn" class="red" onclick="endCall()">
                    <span>📞</span> إنهاء المكالمة
                </button>
            </div>
        </div>
        <div class="chat-section">
            <div class="chat-input-container">
                <input type="text" id="chat-input" placeholder="اكتب رسالتك هنا...">
                <button id="send-btn">إرسال</button>
            </div>
            <div class="gif-container" id="gif-container">
                <div id="gif-placeholder">سيتم عرض GIFs هنا عند إرسال رسالة</div>
            </div>
            <div class="translation-section" id="translation-container">
                <div id="translation-placeholder">سيتم عرض ترجمة لغة الإشارة هنا</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/RecordRTC/5.6.2/RecordRTC.min.js"></script>
    <script>
        let peerConnection;
        const iceServers = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };
        let remoteUserSid = null;
        let localUserSid = 'username'; // يجب استبدال هذا بمعرف المستخدم الحقيقي

        const socket = io('/video');
        let timerElement = document.getElementById('timer');
        let chatInput = document.getElementById('chat-input');
        let sendBtn = document.getElementById('send-btn');
        let gifContainer = document.getElementById('gif-container');
        let gifPlaceholder = document.getElementById('gif-placeholder');
        let translationContainer = document.getElementById('translation-container');
        let translationPlaceholder = document.getElementById('translation-placeholder');
        let callTime = 0;
        let timerInterval;
        
        // عناصر الفيديو والصوت
        let localVideo = document.getElementById('local-video');
        let remoteVideo = document.getElementById('remote-video');
        let screenShareVideo = document.getElementById('screen-share');
        let micBtn = document.getElementById('mic-btn');
        let cameraBtn = document.getElementById('camera-btn');
        let screenShareBtn = document.getElementById('screen-share-btn');
        let recordBtn = document.getElementById('record-btn');
        let endCallBtn = document.getElementById('end-call-btn');
        let downloadBtn = document.getElementById('download-btn');
        let micIcon = document.getElementById('mic-icon');
        let cameraIcon = document.getElementById('camera-icon');
        let screenShareIcon = document.getElementById('screen-share-icon');
        let recordIcon = document.getElementById('record-icon');
        let micStatus = document.getElementById('mic-status');
        let cameraStatus = document.getElementById('camera-status');
        let screenShareStatus = document.getElementById('screen-share-status');
        let cameraOffOverlay = document.getElementById('camera-off-overlay');
        let recordingIndicator = document.getElementById('recording-indicator');
        
        // حالة المكالمة
        let isMicMuted = false;
        let isCameraOff = false;
        let isScreenSharing = false;
        let isRecording = false;
        let localStream = null;
        let screenStream = null;
        let audioStream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recordedBlob = null;
        let currentGifArray = [];
        let gifInterval = null;

        // بدء المكالمة
        socket.on('connect', () => {
            console.log('Connected to /video namespace');
            startTimer();
            initVideoCall().then(() => {
                remoteUserSid = 'username'; // يجب استبدال هذا بقيمة حقيقية
                startCall();
            });
        });

        function startTimer() {
            timerInterval = setInterval(() => {
                callTime++;
                const minutes = Math.floor(callTime / 60).toString().padStart(2, '0');
                const seconds = (callTime % 60).toString().padStart(2, '0');
                timerElement.children[0].textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        async function initVideoCall() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: true,
                    audio: true
                });
                
                localVideo.srcObject = localStream;
                localVideo.classList.remove('hidden');
                document.querySelector('.video-overlay').classList.remove('hidden');
                document.getElementById('video-placeholder').classList.add('hidden');
                
            } catch (error) {
                console.error('Error accessing media devices:', error);
                alert('تعذر الوصول إلى الكاميرا أو الميكروفون. يرجى التحقق من الأذونات.');
            }
        }

        function createPeerConnection() {
            peerConnection = new RTCPeerConnection(iceServers);
            
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit('ice_candidate', {
                        candidate: event.candidate,
                        target_sid: remoteUserSid
                    });
                }
            };
            
            peerConnection.ontrack = (event) => {
                remoteVideo.srcObject = event.streams[0];
                remoteVideo.classList.remove('hidden');
            };
        }

        async function startCall() {
            createPeerConnection();
            
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            
            socket.emit('offer', {
                offer: offer,
                target_sid: remoteUserSid
            });
        }

        socket.on('offer', async (data) => {
            remoteUserSid = data.sid;
            createPeerConnection();
            
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            
            socket.emit('answer', {
                answer: answer,
                target_sid: remoteUserSid
            });
        });

        socket.on('answer', async (data) => {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
        });

        socket.on('ice_candidate', async (data) => {
            if (peerConnection && data.candidate) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        });

        function toggleMic() {
            if (localStream) {
                isMicMuted = !isMicMuted;
                localStream.getAudioTracks().forEach(track => {
                    track.enabled = !isMicMuted;
                });
                
                if (audioStream) {
                    audioStream.getAudioTracks().forEach(track => {
                        track.enabled = !isMicMuted;
                    });
                }
                
                if (isMicMuted) {
                    micBtn.classList.add('active');
                    micIcon.textContent = '🔇';
                    document.getElementById('mic-text').textContent = 'فتح الميكروفون';
                    micStatus.classList.remove('hidden');
                    micStatus.textContent = 'الميكروفون: مغلق';
                } else {
                    micBtn.classList.remove('active');
                    micIcon.textContent = '🎤';
                    document.getElementById('mic-text').textContent = 'إغلاق الميكروفون';
                    micStatus.classList.add('hidden');
                }
            }
        }

        function toggleCamera() {
            if (localStream) {
                isCameraOff = !isCameraOff;
                localStream.getVideoTracks().forEach(track => {
                    track.enabled = !isCameraOff;
                });
                
                if (isCameraOff) {
                    cameraBtn.classList.add('active');
                    cameraIcon.textContent = '🚫';
                    document.getElementById('camera-text').textContent = 'فتح الكاميرا';
                    cameraStatus.classList.remove('hidden');
                    cameraStatus.textContent = 'الكاميرا: مغلقة';
                    cameraOffOverlay.classList.remove('hidden');
                } else {
                    cameraBtn.classList.remove('active');
                    cameraIcon.textContent = '📷';
                    document.getElementById('camera-text').textContent = 'إغلاق الكاميرا';
                    cameraStatus.classList.add('hidden');
                    cameraOffOverlay.classList.add('hidden');
                }
            }
        }

        async function toggleScreenShare() {
            try {
                if (!isScreenSharing) {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({
                        video: true,
                        audio: true
                    });
                    
                    screenShareVideo.srcObject = screenStream;
                    screenShareVideo.classList.remove('hidden');
                    remoteVideo.classList.add('hidden');
                    
                    screenShareBtn.classList.add('active');
                    screenShareIcon.textContent = '❌';
                    document.getElementById('screen-share-text').textContent = 'إيقاف المشاركة';
                    screenShareStatus.classList.remove('hidden');
                    isScreenSharing = true;
                    
                    screenStream.getVideoTracks()[0].onended = () => {
                        toggleScreenShare();
                    };
                } else {
                    screenStream.getTracks().forEach(track => track.stop());
                    screenShareVideo.classList.add('hidden');
                    remoteVideo.classList.remove('hidden');
                    
                    screenShareBtn.classList.remove('active');
                    screenShareIcon.textContent = '🖥️';
                    document.getElementById('screen-share-text').textContent = 'مشاركة الشاشة';
                    screenShareStatus.classList.add('hidden');
                    isScreenSharing = false;
                }
            } catch (error) {
                console.error('Error sharing screen:', error);
            }
        }

        async function toggleRecording() {
            if (!isRecording) {
                startScreenRecording();
            } else {
                stopRecording();
            }
        }

        async function startScreenRecording() {
            try {
                screenStream = await navigator.mediaDevices.getDisplayMedia({
                    video: {
                        displaySurface: 'monitor',
                        logicalSurface: true,
                        cursor: 'always'
                    },
                    audio: true
                });

                if (!isMicMuted && localStream) {
                    audioStream = new MediaStream();
                    localStream.getAudioTracks().forEach(track => {
                        const newTrack = track.clone();
                        audioStream.addTrack(newTrack);
                    });
                }

                const combinedStream = new MediaStream();
                screenStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
                screenStream.getAudioTracks().forEach(track => combinedStream.addTrack(track));
                if (audioStream) {
                    audioStream.getAudioTracks().forEach(track => combinedStream.addTrack(track));
                }

                recordedChunks = [];
                mediaRecorder = new MediaRecorder(combinedStream, { mimeType: 'video/webm' });
                
                mediaRecorder.ondataavailable = function(e) {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };
                
                mediaRecorder.onstop = function() {
                    recordedBlob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(recordedBlob);
                    
                    downloadBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `تسجيل-شاشة-${new Date().toISOString()}.webm`;
                        document.body.appendChild(a);
                        a.click();
                        setTimeout(() => {
                            document.body.removeChild(a);
                            window.URL.revokeObjectURL(url);
                        }, 100);
                    };
                    
                    downloadBtn.style.display = 'flex';
                };
                
                mediaRecorder.start(1000);
                isRecording = true;
                recordBtn.classList.add('active');
                recordIcon.textContent = '■';
                document.getElementById('record-text').textContent = 'إيقاف التسجيل';
                recordingIndicator.style.display = 'inline-block';

                screenStream.getVideoTracks()[0].onended = () => {
                    if (isRecording) {
                        stopRecording();
                    }
                };

            } catch (error) {
                console.error('Error starting screen recording:', error);
                alert('تعذر بدء تسجيل الشاشة. يرجى التحقق من الأذونات.');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                recordBtn.classList.remove('active');
                recordIcon.textContent = '●';
                document.getElementById('record-text').textContent = 'تسجيل الشاشة';
                recordingIndicator.style.display = 'none';
                
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                }
                if (audioStream) {
                    audioStream.getTracks().forEach(track => track.stop());
                    audioStream = null;
                }
            }
        }

        function endCall() {
            clearInterval(timerInterval);
            
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            if (screenStream) {
                screenStream.getTracks().forEach(track => track.stop());
            }
            if (isRecording) {
                stopRecording();
            }
            if (gifInterval) {
                clearInterval(gifInterval);
            }
            
            alert('المكالمة قد أُغلقت');
            window.location.href = '{{ url_for("index") }}';
        }

        socket.on('chat_response', (data) => {
            if (gifInterval) {
                clearInterval(gifInterval);
            }
            gifContainer.innerHTML = '';
            gifPlaceholder.classList.add('hidden');
            
            currentGifArray = data.gifs;
            
            if (currentGifArray.length > 0) {
                let currentIndex = 0;
                
                displayGif(currentGifArray[currentIndex]);
                currentIndex++;
                
                gifInterval = setInterval(() => {
                    if (currentIndex >= currentGifArray.length) {
                        currentIndex = 0;
                    }
                    displayGif(currentGifArray[currentIndex]);
                    currentIndex++;
                }, 2000);
            }  else {
                gifPlaceholder.textContent = 'لا توجد نتائج لعرضها';
                gifPlaceholder.classList.remove('hidden');
            }
        });

        socket.on('sign_language_translation', (data) => {
            const { sentence, reshaped_sentence, sid } = data;
            translationPlaceholder.classList.add('hidden');
            translationContainer.innerHTML = '';
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('translation-message');
            messageDiv.classList.add(sid === localUserSid ? 'local' : 'remote');
            let sentenceHtml = '';
            sentence.forEach(item => {
                sentenceHtml += `${item.word} `;
            });
            messageDiv.textContent = sentenceHtml.trim() || reshaped_sentence;
            translationContainer.appendChild(messageDiv);
            translationContainer.scrollTop = translationContainer.scrollHeight;
        });

        function displayGif(url) {
            gifContainer.innerHTML = '';
            const img = document.createElement('img');
            img.src = url;
            img.alt = "GIF";
            gifContainer.appendChild(img);
        }

        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage() {
            const message = chatInput.value.trim();
            if (message) {
                console.log('Sending message:', message);
                socket.emit('chat_message', { message });
                chatInput.value = '';
            }
        }

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 640; // Adjust as needed
        canvas.height = 480;

        function sendFrame() {
            if (localVideo.readyState >= localVideo.HAVE_CURRENT_DATA) {
                ctx.drawImage(localVideo, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg', 0.5); // Compress to JPEG
                socket.emit('video_frame', { frame: imageData }, () => {
                    setTimeout(sendFrame, 33); // ~30 FPS
                });
            } else {
                setTimeout(sendFrame, 33);
            }
        }

        localVideo.onloadeddata = () => {
            sendFrame();
        };
    </script>
</body>
</html>
